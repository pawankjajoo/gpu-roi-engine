        /* 
           BASE RESET
            */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, .ribbon-container {
            height: 180px;
            max-height: 180px;
            width: 100%;
            overflow: hidden;
            font-family: 'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html, body {
            background: #090a0f;
        }

        .ribbon-container {
            background: #090a0f;
            display: flex;
            flex-direction: column;
            border: 1px solid #1a1d2a;
        }

        ::selection {
            background: #f97316;
            color: #090a0f;
        }

        /* 
           HEADER. Logo, charity link, LIVE dot, 60s refresh timer
            */
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #1a1d2a;
            background: #0f1118;
            flex-shrink: 0;
            min-height: 48px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .header-logo-img {
            height: 22px;
            width: auto;
            opacity: 0.95;
            transition: opacity 0.2s ease;
        }

        .header-logo:hover .header-logo-img {
            opacity: 1;
        }

        .header-charity-link {
            font-size: 11px;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s ease;
            border-left: 1px solid #1e2028;
            padding-left: 12px;
        }

        .header-charity-link:hover {
            color: #f97316;
        }

        .header-charity-link .hashtag {
            color: #f97316;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* Status indicator. green dot = live, orange = cached */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse-live 2s ease-in-out infinite;
        }

        .status-dot.live {
            background: #34d399;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
        }

        .status-dot.cached {
            background: #f97316;
            animation: pulse-cached 2s ease-in-out infinite;
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-cached {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.3; }
        }

        /* 60-second refresh timer. CSS spinner + JS countdown */
        .refresh-timer {
            position: relative;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-circle {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #1a1d2a;
            border-top-color: #f97316;
            animation: spin-timer 60s linear infinite;
        }

        @keyframes spin-timer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .timer-text {
            font-size: 9px;
            font-weight: 700;
            z-index: 1;
            color: #f97316;
        }

        /* 
           TICKER MARQUEE. Bottom section, fills remaining height
           Infinite scroll. Items duplicated in JS for loop.
           Pause on hover. Scale-up on item hover.
            */
        .ticker-section {
            flex: 1;
            background: #090a0f;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fade edges for smooth feel */
        .ticker-section::before,
        .ticker-section::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            z-index: 2;
            pointer-events: none;
        }

        .ticker-section::before {
            left: 0;
            background: linear-gradient(to right, #090a0f, transparent);
        }

        .ticker-section::after {
            right: 0;
            background: linear-gradient(to left, #090a0f, transparent);
        }

        .marquee-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        .marquee-track {
            display: flex;
            gap: 4px;
            padding: 0 16px;
            animation: scroll-marquee 45s linear infinite;
            min-width: max-content;
        }

        @keyframes scroll-marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 2px)); }
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        /* Individual ticker item. card-like feel from the Ticker design */
        .ticker-item {
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .ticker-item:hover {
            background: rgba(249, 115, 22, 0.06);
            border-color: rgba(249, 115, 22, 0.2);
            transform: scale(1.04);
        }

        /* Thin separator between items */
        .ticker-separator {
            width: 1px;
            height: 40px;
            background: #1a1d2a;
            flex-shrink: 0;
            opacity: 0.5;
        }

        /* Brand color accent dot */
        .ticker-brand-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ticker-brand-dot.nvidia { background: #76b852; box-shadow: 0 0 6px rgba(118, 184, 82, 0.4); }
        .ticker-brand-dot.amd { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }
        .ticker-brand-dot.intel { background: #0071C5; box-shadow: 0 0 6px rgba(0, 113, 197, 0.4); }
        .ticker-brand-dot.bitmain { background: #f59e0b; box-shadow: 0 0 6px rgba(245, 158, 11, 0.4); }

        .ticker-gpu-name {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: -0.3px;
        }

        .ticker-profit {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .ticker-profit.positive { color: #34d399; }
        .ticker-profit.negative { color: #ef4444; }

        .ticker-unit {
            font-size: 10px;
            font-weight: 500;
            color: #64748b;
            margin-left: -2px;
        }

        .ticker-arrow {
            font-size: 11px;
            margin-left: -4px;
        }

        .ticker-arrow.up { color: #34d399; }
        .ticker-arrow.down { color: #ef4444; }

        /* 
           TOOLTIP. Rich breakdown on hover (Mining / Cloud / AI)
           Orange-accented, positioned above the item.
            */
        .ticker-tooltip {
            position: fixed;
            background: #111318;
            border: 1px solid #f97316;
            border-top: 2px solid #f97316;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 11px;
            color: #e2e8f0;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 99999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            line-height: 1.6;
        }

        .ticker-tooltip.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .tooltip-title {
            font-weight: 700;
            font-size: 12px;
            color: #f97316;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1a1d2a;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 3px;
        }

        .tooltip-label {
            color: #94a3b8;
        }

        .tooltip-value {
            font-weight: 600;
            text-align: right;
        }

        .tooltip-value.positive { color: #34d399; }
        .tooltip-value.negative { color: #ef4444; }
        .tooltip-value.na { color: #475569; }
        .tooltip-value.highlight { color: #f97316; }

        .tooltip-commentary {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #1a1d2a;
            font-style: italic;
            color: #64748b;
            font-size: 10px;
        }

        /* 
           RESPONSIVE. Mobile adjustments
            */
        @media (max-width: 479px) {
            .header-charity-link {

            .ticker-gpu-name {
                font-size: 12px;
            }

            .ticker-profit {
                font-size: 15px;
            }

            .marquee-track {
                padding: 0 8px;
                gap: 2px;
            }

            .ticker-item {
                padding: 8px 10px;
                gap: 6px;
            }

            .ticker-section::before,
            .ticker-section::after {
                width: 20px;
            }

            .status-indicator span {
                display: none;
            }
        }

        /* Tablet+ refinements */
        @media (min-width: 768px) {
            .ticker-gpu-name { font-size: 15px; }
            .ticker-profit { font-size: 19px; }
            .ticker-item { padding: 10px 18px; gap: 12px; }
        }

        /* Large screens */
        @media (min-width: 1920px) {
            .ticker-gpu-name { font-size: 17px; }
            .ticker-profit { font-size: 22px; }
            .ticker-item { padding: 12px 22px; gap: 14px; }
            .header-logo-img { height: 26px; }
            .marquee-track { gap: 6px; }
        }

        /* 4K+ */
        @media (min-width: 3840px) {
            .ticker-gpu-name { font-size: 22px; }
            .ticker-profit { font-size: 28px; }
            .ticker-item { padding: 14px 28px; gap: 16px; }
            .header-logo-img { height: 32px; }
            .widget-header { padding: 12px 32px; }
            .refresh-timer { width: 38px; height: 38px; }
            .timer-circle { width: 34px; height: 34px; border-width: 3px; }
            .timer-text { font-size: 11px; }
        }

        /* 
           ACCESSIBILITY
            */
        @media (prefers-reduced-motion: reduce) {
            .marquee-track { animation: none; }
            .timer-circle { animation: none; }
            .status-dot { animation: none; }
            * {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        @media (pointer: coarse) {
            .ticker-item { min-height: 44px; }
        }

        @supports (padding: env(safe-area-inset-left)) {
            .widget-header {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }
        }

        button:focus-visible,
        a:focus-visible {
            outline: 2px solid #f97316;
            outline-offset: 2px;
        }
    </style>

        ];

        /* 
           CALCULATION FUNCTIONS
            */
        function calculateMiningProfit(miningRevenue, tdp, electricityCost) {
            if (miningRevenue === null || miningRevenue === undefined) return null;
            return miningRevenue - ((tdp / 1000) * 24 * electricityCost);
        }

        function calculateCloudProfit(grossDaily, tdp, electricityCost) {
            if (!grossDaily) return 0;
            const platformFee = grossDaily * 0.15; // ~15% Vast.ai/RunPod cut
            const elec = (tdp / 1000) * 24 * electricityCost;
            return grossDaily - platformFee - elec;
        }

        function calculateAiProfit(grossDaily, tdp, electricityCost) {
            if (!grossDaily) return 0;
            const platformFee = grossDaily * 0.10; // ~10% AI platform cut
            const elec = (tdp / 1000) * 24 * electricityCost;
            return grossDaily - platformFee - elec;
        }

        function calculateBestProfit(gpu, electricityCost) {
            const mining = calculateMiningProfit(gpu.mining, gpu.tdp, electricityCost) || 0;
            const cloud = calculateCloudProfit(gpu.cloudLease, gpu.tdp, electricityCost);
            const ai = calculateAiProfit(gpu.aiLease, gpu.tdp, electricityCost);
            return Math.max(mining, cloud, ai);
        }

        function getBestSource(gpu, electricityCost) {
            const mining = calculateMiningProfit(gpu.mining, gpu.tdp, electricityCost) || 0;
            const cloud = calculateCloudProfit(gpu.cloudLease, gpu.tdp, electricityCost);
            const ai = calculateAiProfit(gpu.aiLease, gpu.tdp, electricityCost);
            const max = Math.max(mining, cloud, ai);
            if (max === ai && ai > 0) return 'AI Lease';
            if (max === cloud && cloud > 0) return 'Cloud';
            if (max === mining && mining > 0) return 'Mining';
            return 'N/A';
        }

        function fmt(value) {
            if (value === null || value === undefined || isNaN(value)) return '-';
            const sign = value >= 0 ? '+' : '';
            return sign + '$' + Math.abs(value).toFixed(2);
        }

        function fmtPlain(value) {
            if (value === null || value === undefined || isNaN(value)) return '-';
            return '$' + value.toFixed(2);
        }

        /* 
           STATE & RENDERING
            */
        const AppState = {
            electricityCost: 0.12,
            timeRemaining: 60
        };

        function loadSettings() {
            try {
                const stored = localStorage.getItem('ribbonElectricityCost');
                if (stored) AppState.electricityCost = parseFloat(stored) || 0.12;
            } catch (e) { /* localStorage unavailable in some iframe contexts */ }
        }

        function renderTicker() {
            const track = document.getElementById('marqueeTrack');
            track.innerHTML = '';

            const ec = AppState.electricityCost;

            // Calculate best daily profit for eaach GPU and sort descending
            const gpusWithProfit = BASELINE_GPU_DATA.map(gpu => ({
                ...gpu,
                bestProfit: calculateBestProfit(gpu, ec),
                bestSource: getBestSource(gpu, ec),
                miningProfit: calculateMiningProfit(gpu.mining, gpu.tdp, ec)
            })).sort((a, b) => b.bestProfit - a.bestProfit);

            // Duplicate for continuous loop
            const items = [...gpusWithProfit, ...gpusWithProfit];

            items.forEach((gpu, i) => {
                // Separator between items (skip first)
                if (i > 0) {
                    const sep = document.createElement('div');
                    sep.className = 'ticker-separator';
                    track.appendChild(sep);
                }

                const profitValue = gpu.bestProfit;
                const isPositive = profitValue >= 0;

                // Build tooltip content
                const miningLine = gpu.mining !== null
                    ? `<div class="tooltip-row"><span class="tooltip-label">Mining</span><span class="tooltip-value ${gpu.miningProfit >= 0 ? 'positive' : 'negative'}">${fmtPlain(gpu.miningProfit)}/day</span></div>`
                    : `<div class="tooltip-row"><span class="tooltip-label">Mining</span><span class="tooltip-value na">N/A</span></div>`;

                const cloudLine = gpu.cloudLease
                    ? `<div class="tooltip-row"><span class="tooltip-label">Cloud Lease</span><span class="tooltip-value positive">${fmtPlain(gpu.cloudLease)}/day</span></div>`
                    : `<div class="tooltip-row"><span class="tooltip-label">Cloud Lease</span><span class="tooltip-value na">N/A</span></div>`;

                const aiLine = gpu.aiLease
                    ? `<div class="tooltip-row"><span class="tooltip-label">AI Lease</span><span class="tooltip-value positive">${fmtPlain(gpu.aiLease)}/day</span></div>`
                    : `<div class="tooltip-row"><span class="tooltip-label">AI Lease</span><span class="tooltip-value na">N/A</span></div>`;

                const roiDays = profitValue > 0 ? Math.ceil(gpu.msrp / profitValue) : '∞';

                const item = document.createElement('div');
                item.className = 'ticker-item';
                item.innerHTML = `
                    <div class="ticker-brand-dot ${gpu.brand}"></div>
                    <span class="ticker-gpu-name">${gpu.name}</span>
                    <span class="ticker-profit ${isPositive ? 'positive' : 'negative'}">${fmtPlain(profitValue)}</span>
                    <span class="ticker-unit">/day</span>
                    <span class="ticker-arrow ${isPositive ? 'up' : 'down'}">${isPositive ? '▲' : '▼'}</span>
                    <div class="ticker-tooltip">
                        <div class="tooltip-title">${gpu.name}</div>
                        ${miningLine}
                        ${cloudLine}
                        ${aiLine}
                        <div class="tooltip-row"><span class="tooltip-label">Best via</span><span class="tooltip-value highlight">${gpu.bestSource}</span></div>
                        <div class="tooltip-row"><span class="tooltip-label">MSRP</span><span class="tooltip-value">${fmtPlain(gpu.msrp)}</span></div>
                        <div class="tooltip-row"><span class="tooltip-label">ROI Payback</span><span class="tooltip-value highlight">${roiDays === '∞' ? '∞' : roiDays + ' days'}</span></div>
                        <div class="tooltip-row"><span class="tooltip-label">TDP</span><span class="tooltip-value">${gpu.tdp}W</span></div>
                        <div class="tooltip-commentary">"${gpu.commentary}"</div>
                    </div>
                `;
                track.appendChild(item);
            });

            // Set up fixed-position tooltip handlers
            setupTooltipHandlers();
        }

        function setupTooltipHandlers() {
            document.querySelectorAll('.ticker-item').forEach(item => {
                const tooltip = item.querySelector('.ticker-tooltip');
                if (!tooltip) return;

                item.addEventListener('mouseenter', () => {
                    const rect = item.getBoundingClientRect();
                    tooltip.style.left = (rect.left + rect.width / 2) + 'px';
                    tooltip.style.transform = 'translateX(-50%)';
                    const tooltipHeight = tooltip.offsetHeight || 180;
                    if (rect.top - tooltipHeight - 10 < 0) {
                        tooltip.style.top = (rect.bottom + 10) + 'px';
                    } else {
                        tooltip.style.top = (rect.top - tooltipHeight - 10) + 'px';
                    }
                    tooltip.classList.add('visible');
                });

                item.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
            });
        }

        /*
           TIMER. 60s countdown, re-renders on cycle
            */
        function startTimer() {
            AppState.timeRemaining = 60;
            updateTimerDisplay();

            const interval = setInterval(() => {
                AppState.timeRemaining--;
                updateTimerDisplay();
                if (AppState.timeRemaining <= 0) {
                    clearInterval(interval);
                    refreshData();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const el = document.getElementById('timerText');
            if (el) el.textContent = AppState.timeRemaining;
        }

        function refreshData() {
            renderTicker();
            startTimer();
        }

        /* 
           INIT
            */
        loadSettings();
        renderTicker();
        startTimer();
    </script>
